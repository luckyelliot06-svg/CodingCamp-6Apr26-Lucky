<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
   <h3> <span class="logo">✦ Dashboard</span> </h3>
  <nav>
    <button id="theme-toggle" aria-label="Toggle theme">
      <span id="theme-icon">🌙</span>
      <span id="theme-label">Dark</span>
    </button>
  </nav>
</header>

  </header>

  <main class="widget-grid">
    <!-- Greeting Widget -->
    <section id="greeting" class="widget" aria-label="Greeting">
      <div id="greeting-time"></div>
      <div id="greeting-date"></div>
      <div id="greeting-message"></div>
      <form id="greeting-form">
        <label for="name-input">Your name</label>
         <input type="text" id="name-input" placeholder="Enter your name" autocomplete="off" />
        <button type="submit">Save</button>
         <p id="greeting-sub">Ready to have a productive day?</p>
    
      </form>
    </section>

    <!-- Focus Timer Widget -->
    <section id="focus-timer" class="widget" aria-label="Focus Timer">
      <h2>Focus Timer</h2>
      <div id="timer-display" aria-live="polite">25:00</div>
      <div class="timer-controls">
        <button id="timer-start">Start</button>
        <button id="timer-stop">Stop</button>
        <button id="timer-reset">Reset</button>
      </div>
      <div id="timer-notification" role="status" aria-live="polite"></div>
    </section>

    <!-- Todo List Widget -->
    <section id="todo-list" class="widget" aria-label="To-Do List">
      <h2>To-Do List</h2>
      <form id="todo-form">
        <label for="todo-input">New task</label>
        <input type="text" id="todo-input" placeholder="Add a task..." autocomplete="off" />
        <button type="submit">Add</button>
      </form>
      <div id="todo-error" role="alert" aria-live="polite"></div>
      <ul id="todo-items"></ul>
    </section>

    <!-- Quick Links Widget -->
    <section id="quick-links" class="widget" aria-label="Quick Links">
      <h2>Quick Links</h2>
      <form id="links-form">
        <label for="link-label-input">Label</label>
        <input type="text" id="link-label-input" placeholder="Label" autocomplete="off" />
        <label for="link-url-input">URL</label>
        <input type="url" id="link-url-input" placeholder="https://example.com" autocomplete="off" />
        <button type="submit">Add Link</button>
      </form>
      <div id="links-error" role="alert" aria-live="polite"></div>
      <div id="links-list"></div>
    </section>
  </main>

  <div id="storage-warning" role="alert" aria-live="polite" hidden></div>

  <script src="js/app.js"></script>
</body>
</html>
